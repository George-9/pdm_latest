<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pdm log in</title>

    <link rel="stylesheet" href="../../css/index.css">

    <style>
        input {
            border: none;
            padding: 12px;
        }
    </style>
</head>

<body>
    <div class="flex-column full-width align-center" style="padding: 30px;">
        <div class="flex-column justify-center align-center full-height"
            style="background-color: royalblue; width: 800px; height: 400px; margin: 1%; color: white;;">

            <div class="flex-column full-height align-center justify-center full-width"
                style="background-color: white; flex: 0; max-height: 60px;">
                <h1 style="font-weight: 100; padding: 10px; color: gray;">Log In</h1>
                <p id="notifier"></p>
            </div>

            <div class="flex-column align-center justify-center" style="flex: 8;">
                <input id="code" type="text" placeholder="parish code">
                <input id="password" type="password" placeholder="password">

                <button id="logInButton" style="background-color: white; color: grey;">Log In</button>
                <br>
                <p id="messege"></p>
            </div>
        </div>

    </div>

    <script type="module" src="../scripts/drawer.js"></script>
    <script type="module" src="../scripts/logIn.js"></script>
</body>

</html>
