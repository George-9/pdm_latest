<!DOCTYPE html>
<html lang="en">

<head>


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pdm | member upload</title>

    <!-- AgDataGrid -->
    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>

    <!-- XLSX -->
    <script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>

    <!-- partial features -->
    <!-- <script src="exceljs.js"></script> -->

    <link rel="stylesheet" href="../../css/index.css">
    <link rel="stylesheet" href="../../css/drawer.css">
    <link rel="stylesheet" href="../../css/modal.css">

</head>

<body>

    <nav class="nav-bar flex-row align-end justify-space-between"
        style="border: none; padding: 20px; background-color: rgb(231, 231, 231); position: fixed; top: 0px; margin-bottom: 20px; box-sizing: border-box;">
        <h3 class="s-display" style="color: royalblue; font-weight: 800;">PDM</h3>
        <img id="drawer-toggle" class="s-display icon" src="../../resources/icons/menu_black.png"
            style="margin-right: 20px; position: fixed; right: 1px;" alt="" />
    </nav>


    <!-- Drawer -->
    <div class="drawer flex-column">
        <div class="full-width align-center justify-center flex-column" id="heading" style="margin-bottom: 10px;">
            <p style="font-size: 16px; font-weight: 100; text-align: start;">
                <span> PDM</span><br>
                <span> Parish Data Manager</span>
            </p>
        </div>

        <hr width="100%">

        <div class="flex-column" style="padding: 10px;">
            <div class="flex-row align-center">
                <img class="icon" src="../../resources/icons/person_white.png" alt="">
                <a id="profile" href="pdm">profile</a>
            </div>

            <div class="flex-row align-center">
                <img class="icon" src="../../resources/icons/groups_white.png" alt="">
                <a id="members" href="members">members</a>
            </div>

            <div class="flex-row align-center">
                <img class="icon" src="../../resources/icons/home_white.png" alt="">
                <a href="outstations">outstations</a>
            </div>

            <div class="flex-row align-center">
                <img class="icon" src="../../resources/icons/edit_white.png" alt="">
                <a id="registry" href="registry">registry</a>
            </div>

            <div class="flex-row align-center">
                <img class="icon" src="../../resources/icons/leaderboard_white.png" alt="">
                <a id="office" href="office">office</a>
            </div>

            <div class="flex-row align-center">
                <img class="icon" src="../../resources/icons/groups_white.png" alt="">
                <a id="groups" href="groups">groups</a>
            </div>

            <div class="flex-row align-center">
                <img class="icon" src="../../resources/icons/cloud_upload.png" alt="">
                <a id="upload" href="upload">upload</a>
            </div>

            <div class="flex-row align-center">
                <img class="icon" src="../../resources/icons/help_white.png" alt="">
                <a id="help">help</a>
            </div>
        </div>
    </div>

    <div class="container flex-column  align-center justify-center">
        <div class="flex-column  align-center justify-center"
            style="background-color: royalblue; width: 60%; height: 80%; color: white;">

            <div class="full-height align-start justify-start" style="flex: 1;">
                <h1 style="color: white; font-weight: 100;">Upload members</h1>
            </div>

            <div class="flex-column full-height full-width align-center justify-space-between" style="flex: 2;">
                <div class="flex-column">
                    <input id="file-source" type="file" accept=".xlsx, .xls"
                        style=" color: white; border-color: white;">
                    <button id="submit-members" style="background-color: white; color: #000;">Upload</button>
                </div>

                <div class="flex-column align-center">
                    <p>Please confirm that your data has the manadatory fields</p>
                    <button id="sample"
                        style="background-color: gainsboro; color: gray; width: 100px; height: 45px; padding: 3px; margin: 10px;">sample
                        data</button>
                </div>
            </div>

        </div>
    </div>

    <script type="module" src="../scripts/drawer.js"></script>
    <script type="module" src="../scripts/help.js"></script>
    <script type="module" src="../scripts/uploadMembers.js"></script>
</body>

</html>
