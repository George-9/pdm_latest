<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leader Management</title>

    <link rel="stylesheet" href="../../css/index.css">

    <style>
        .navbar {
            background-color: #dfdfdf;
            overflow: hidden;
        }

        .navbar a {
            float: left;
            display: block;
            color: gray;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
            background-color: gainsboro;
        }

        .navbar a:hover {
            background-color: #ddd;
            color: black;
        }

        .add-leader-card {
            display: none;
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f9f9f9;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        table,
        th,
        td {
            border: 1px solid black;
        }

        th,
        td {
            padding: 8px;
            text-align: left;
        }
    </style>
</head>

<body>
    <nav class="nav-bar flex-row align-end justify-space-between"
        style="border: none; padding: 20px; background-color: rgb(231, 231, 231); position: fixed; top: 0px; margin-bottom: 20px; box-sizing: border-box;">
        <h3 class="s-display" style="color: royalblue; font-weight: 800;">PDM</h3>
        <img id="drawer-toggle" class="s-display icon" src="../../resources/icons/menu_black.png"
            style="margin-right: 20px; position: fixed; right: 1px;" alt="" />
    </nav>

    <!-- Drawer -->
    <div class="drawer flex-column">
        <div class="full-width align-center justify-center flex-column" id="heading" style="margin-bottom: 10px;">
            <p style="font-size: 16px; font-weight: 100; text-align: start;">
                <span> PDM</span><br>
                <span> Parish Data Manager</span>
            </p>
        </div>

        <hr width="100%">

        <div class="flex-column" style="padding: 10px;">
            <div class="flex-row align-center">
                <img class="icon" src="../../resources/icons/person_white.png" alt="">
                <a id="profile" href="pdm">profile</a>
            </div>

            <div class="flex-row align-center">
                <img class="icon" src="../../resources/icons/groups_white.png" alt="">
                <a id="members" href="members">members</a>
            </div>

            <div class="flex-row align-center">
                <img class="icon" src="../../resources/icons/home_white.png" alt="">
                <a href="outstations">outstations</a>
            </div>

            <div class="flex-row align-center">
                <img class="icon" src="../../resources/icons/edit_white.png" alt="">
                <a id="registry" href="registry">registry</a>
            </div>

            <div class="flex-row align-center">
                <img class="icon" src="../../resources/icons/leaderboard_white.png" alt="">
                <a id="office" href="office">office</a>
            </div>

            <div class="flex-row align-center">
                <img class="icon" src="../../resources/icons/groups_white.png" alt="">
                <a id="groups" href="groups">groups</a>
            </div>

            <div class="flex-row align-center">
                <img class="icon" src="../../resources/icons/cloud_upload.png" alt="">
                <a id="upload" href="upload">upload</a>
            </div>

            <div class="flex-row align-center">
                <img class="icon" src="../../resources/icons/help_white.png" alt="">
                <a id="help">help</a>
            </div>
        </div>
    </div>


    <div class="container">
        <div class="navbar">
            <a href="#" id="add-icon">Add Leader</a>
        </div>

        <div class="add-leader-card" id="add-leader-card">
            <h3>Add Leader</h3>
            <label for="leader-name">Leader Name:</label>
            <input type="text" id="leader-name" name="leader-name"><br><br>
            <label for="leader-position">Position:</label>
            <select type="text" id="leader-position" name="leader-position">
                <option value="Moderator">Moderator</option>
                <option value="Vice Moderator">Vice Moderator</option>
                <option value="Secretary">Secretary</option>
                <option value="Vice Secretary">Vice Secretary</option>
                <option value="Treasurer">Treasurer</option>
            </select>

            <br><br>
            <button id="submit-leader">Submit</button>
        </div>

        <div id="main-div">
            <table id="leaders-table">
                <caption>Leaders</caption>
                <thead>
                    <tr>
                        <th>Leader Name</th>
                        <th>Position</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Leader rows will be added here -->
                </tbody>
            </table>
        </div>
    </div>

    <script type="module" src="../scripts/addParishLeader.js"></script>

    <script type="module" src="../scripts/drawer.js"></script>
    <script type="module" src="../scripts/help.js"></script>

    <script type="module" src="../scripts/office.js"></script>
</body>

</html>
