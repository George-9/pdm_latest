<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Up</title>

    <link rel="stylesheet" href="../../css/index.css">

    <style>
        html,
        body {
            background-color: white;
        }

        a {
            background-color: unset;
            border: none;
        }

        .icon {
            border: 1px solid;
            padding: 5px;
            margin: 5px;
        }

        button {
            width: 100px;
            padding: 5px;
            min-height: 45px;
            border-radius: 0px;
            background-color: green;
            border: none;
        }
    </style>

</head>

<body>
    <div class="container flex-column align-center">
        <div class="full-width flex-row align-center justify-space-between">
            <a href="registry" title="back">
                <img class="icon" src="../../resources/icons/arrow_back_ios_black.png" alt="back">
            </a>
            <div class="flex-row align-center">
                <img id="add-scc" src="../../resources/icons/add_icon.png" class="icon"
                    title="add another Small Christian Community (SCC)" />

                <button id="save-button">register</button>
            </div>
        </div>

        <div class="flex-column align-center justify-center" style="padding: 20px; max-width: 80%;">

            <div class="full-width flex-column align-start">

                <h1 style="font-weight: 100; color:  black;">
                    add outstations to your parish
                </h1>

                <div class="full-width flex-row justify-start">
                    <input id="outstation-name" type="text" placeholder="outstation name">
                </div>

                <br>

                <span>Hint:</span>
                <span>remember you can add more SCC(s)</span>
                <div class="flex-column" id="sccs-entry">
                    <input type="text" placeholder="SCC name">
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="../scripts/drawer.js"></script>
    <script type="module" src="../scripts/help.js"></script>
    <script type="module" src="../scripts/registerOutstation.js"></script>
</body>

</html>
