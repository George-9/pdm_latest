<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Parish</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <style>
        html,
        body {
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
            height: 100%;
        }

        * {
            text-align: center;
        }

        .f-w {
            width: 100%;
        }

        .f-h {
            height: 100%;
        }

        .flex-col {
            display: flex;
            flex-direction: column;
        }

        .t-a-c {
            text-align: center;
        }

        .j-c-c {
            justify-content: center;
        }

        .a-i-c {
            align-items: center;
        }

        input,
        button {
            width: fit-content;
            margin: 10px;
            min-width: 200px;
        }
    </style>

</head>

<body>
    <p>Register a new parish</p>
    <h2>You must be admin</h2>
    <hr>

    <section class="f-w f-h flex-col a-i-c">

        <input id="adminEmailSrc" type="email" placeholder="admin email">
        <input id="adminPasswordSrc" type="text" placeholder="admin password">
        <input id="parishNameSrc" type="text" placeholder="parish name">
        <input id="parishEmailSrc" type="email" placeholder="parish email">
        <input id="parishCodeSrc" type="text" placeholder="parish code">
        <input id="parishPasswordSrc" type="text" placeholder="parish password">

        <button id="login-button" type="button" class="btn btn-primary">
            Register
        </button>
    </section>

    <script type="module" src="./scripts/registerParish.js"></script>
</body>

</html>
